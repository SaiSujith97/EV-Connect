<svg width="400" height="300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="evGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#evGrad)"/>
  <g transform="translate(200, 150)">
    <!-- Car body -->
    <ellipse cx="0" cy="20" rx="80" ry="15" fill="#34d399" opacity="0.3"/>
    <rect x="-70" y="-20" width="140" height="40" rx="10" fill="#10b981"/>
    <rect x="-50" y="-40" width="100" height="25" rx="8" fill="#059669"/>
    <!-- Windows -->
    <rect x="-45" y="-35" width="40" height="15" rx="4" fill="#e0f2fe"/>
    <rect x="10" y="-35" width="30" height="15" rx="4" fill="#e0f2fe"/>
    <!-- Wheels -->
    <circle cx="-40" cy="20" r="12" fill="#1f2937" stroke="#fff" stroke-width="2"/>
    <circle cx="40" cy="20" r="12" fill="#1f2937" stroke="#fff" stroke-width="2"/>
    <circle cx="-40" cy="20" r="6" fill="#6b7280"/>
    <circle cx="40" cy="20" r="6" fill="#6b7280"/>
    <!-- Lightning bolt -->
    <path d="M 10,-10 L 5,0 L 10,0 L 5,15 L 15,5 L 10,5 Z" fill="#fbbf24" stroke="#f59e0b" stroke-width="1"/>
  </g>
  <text x="200" y="280" font-family="Arial, sans-serif" font-size="16" fill="white" text-anchor="middle" font-weight="bold">Electric Vehicle</text>
</svg>
