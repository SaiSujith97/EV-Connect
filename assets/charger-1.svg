<svg width="800" height="600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f0fdf4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#dcfce7;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#bg)"/>
  
  <!-- Ground -->
  <rect x="0" y="400" width="800" height="200" fill="#86efac" opacity="0.5"/>
  
  <!-- Charging Station Structure -->
  <rect x="300" y="200" width="200" height="200" rx="10" fill="#10b981"/>
  <rect x="310" y="210" width="180" height="60" rx="5" fill="#059669"/>
  
  <!-- Display Screen -->
  <rect x="330" y="230" width="140" height="30" rx="3" fill="#e0f2fe"/>
  
  <!-- Buttons -->
  <circle cx="350" cy="300" r="8" fill="#34d399"/>
  <circle cx="380" cy="300" r="8" fill="#60a5fa"/>
  <circle cx="410" cy="300" r="8" fill="#fbbf24"/>
  
  <!-- Connector Cable -->
  <path d="M 500 300 Q 550 280 580 320" stroke="#1f2937" stroke-width="8" fill="none" stroke-linecap="round"/>
  <circle cx="580" cy="320" r="15" fill="#1f2937"/>
  <circle cx="580" cy="320" r="8" fill="#fbbf24"/>
  
  <!-- Charging Port -->
  <rect x="200" y="280" width="80" height="100" rx="8" fill="#3b82f6"/>
  <circle cx="240" cy="320" r="20" fill="#60a5fa"/>
  <path d="M 235,310 L 240,320 L 235,330 L 245,330 L 240,320 L 245,310 Z" fill="#fbbf24"/>
  
  <!-- Power Indicator -->
  <circle cx="400" cy="180" r="30" fill="#34d399" opacity="0.3">
    <animate attributeName="r" values="25;35;25" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.5;0.2;0.5" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="400" cy="180" r="12" fill="#10b981"/>
  
  <!-- Text -->
  <text x="400" y="480" font-family="Arial, sans-serif" font-size="24" fill="#059669" text-anchor="middle" font-weight="bold">EV Charging Station</text>
  <text x="400" y="510" font-family="Arial, sans-serif" font-size="16" fill="#6b7280" text-anchor="middle">50 kW Fast Charging Available</text>
</svg>
